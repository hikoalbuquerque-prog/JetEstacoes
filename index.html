<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b1220">
  <title>App Estações Campo</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0b1220;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
      text-align:center;
    }
    .logo {
      width:80px;
      height:80px;
      background:linear-gradient(135deg,#1d4ed8,#3b82f6);
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      margin-bottom:24px;
      box-shadow:0 8px 32px rgba(59,130,246,.4);
    }
    h1 { font-size:22px; font-weight:800; margin-bottom:8px; }
    p  { font-size:14px; color:rgba(255,255,255,.5); margin-bottom:32px; }
    a  {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:14px 28px;
      background:linear-gradient(135deg,#1d4ed8,#3b82f6);
      border-radius:12px;
      color:#fff;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
  </style>
</head>
<body>
  <div class="logo">📍</div>
  <h1>App Estações Campo</h1>
  <p>Cadastro e visualização de estações</p>
  <a href="campo.html">Abrir Mapa</a>
  <script>
    // Redirecionar direto se já instalado como PWA
    if (window.matchMedia('(display-mode: standalone)').matches) {
      window.location.replace('campo.html');
    }
  </script>
</body>
</html>
